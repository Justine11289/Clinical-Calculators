server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # 簡化 CSP：只允許自己與必要的外連
    set $csp "default-src 'self' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://cdn.jsdelivr.net https://thas.mohw.gov.tw;";

    add_header Content-Security-Policy $csp always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 確保 .json 檔案可以被正確讀取
    location ~* \.json$ {
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "no-cache";
    }

    # 針對 HTML 檔案
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
        add_header Content-Security-Policy $csp always;
        try_files $uri /index.html;
    }
}